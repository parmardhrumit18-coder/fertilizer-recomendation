<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fertilizer Recommendation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
        .result {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Fertilizer Predictor</h2>

    <input type="number" id="Temperature" placeholder="Temperature">
    <input type="number" id="Moisture" placeholder="Moisture">
    <input type="number" id="Rainfall" placeholder="Rainfall">
    <input type="number" id="PH" placeholder="pH">
    <input type="number" id="Nitrogen" placeholder="Nitrogen">
    <input type="number" id="Phosphorous" placeholder="Phosphorous">
    <input type="number" id="Potassium" placeholder="Potassium">
    <input type="number" id="Carbon" placeholder="Carbon">

    <select id="Soil">
        <option>Loamy Soil</option>
        <option>Acidic Soil</option>
        <option>Alkaline Soil</option>
        <option>Neutral Soil</option>
        <option>Peaty Soil</option>
    </select>

    <input type="text" id="Crop" placeholder="Crop (e.g. rice)">

    <button onclick="predict()">Predict</button>

    <div class="result" id="result"></div>
</div>

<script>
async function predict() {
    const data = {
        Temperature: parseFloat(document.getElementById("Temperature").value),
        Moisture: parseFloat(document.getElementById("Moisture").value),
        Rainfall: parseFloat(document.getElementById("Rainfall").value),
        PH: parseFloat(document.getElementById("PH").value),
        Nitrogen: parseFloat(document.getElementById("Nitrogen").value),
        Phosphorous: parseFloat(document.getElementById("Phosphorous").value),
        Potassium: parseFloat(document.getElementById("Potassium").value),
        Carbon: parseFloat(document.getElementById("Carbon").value),
        Soil: document.getElementById("Soil").value,
        Crop: document.getElementById("Crop").value
    };

    try {
        const response = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.recommended_fertilizer) {
            document.getElementById("result").innerText =
                "Recommended: " + result.recommended_fertilizer;
        } else {
            document.getElementById("result").innerText =
                "Error: " + result.error;
        }

    } catch (error) {
        document.getElementById("result").innerText =
            "API not reachable. Make sure FastAPI is running.";
    }
}
</script>

</body>
</html>
